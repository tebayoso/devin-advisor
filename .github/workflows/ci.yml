name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test (unit)
        run: npm test
      - name: Test (integration, workers runtime)
        run: npm run test:integration
