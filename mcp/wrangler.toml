name = "devin-scope"
main = "src/index.ts"
compatibility_date = "2024-07-12"
compatibility_flags = ["nodejs_compat"]

# Cloudflare D1 binding. Create the database with:
#   wrangler d1 create devin_scope
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "devin_scope"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Optional "Modo B": delegate the adversarial review to a separate critic Devin
# session via the Devin REST API. Configure the API key as a secret (never commit it):
#   wrangler secret put DEVIN_API_KEY
# When unset, run_adversarial_review falls back to "Modo A" (in-agent review).
# Optionally override the API base URL (defaults to https://api.devin.ai/v1):
# [vars]
# DEVIN_API_BASE_URL = "https://api.devin.ai/v1"
