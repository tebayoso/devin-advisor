name = "devin-scope"
main = "src/index.ts"
compatibility_date = "2024-07-12"
compatibility_flags = ["nodejs_compat"]

# Cloudflare D1 binding. Create the database with:
#   wrangler d1 create devin_scope
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "devin_scope"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Cloudflare Workers AI binding used by decompose_task for model-backed
# decomposition. Optional: without it the tool uses a deterministic heuristic.
# Override the default model (@cf/meta/llama-3-8b-instruct) via the
# DECOMPOSE_MODEL var below if desired.
[ai]
binding = "AI"

# [vars]
# DECOMPOSE_MODEL = "@cf/meta/llama-3-8b-instruct"
