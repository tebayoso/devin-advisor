name = "devin-scope"
main = "src/index.ts"
compatibility_date = "2024-07-12"
compatibility_flags = ["nodejs_compat"]

# Serve the Worker on a custom domain. Wrangler provisions the Custom Domain
# and DNS record automatically since the sinequix.com zone is in this account.
routes = [
  { pattern = "devin.sinequix.com", custom_domain = true }
]

# Optional shared Bearer-token auth. Leave unset for a public demo deployment.
# When set, requests to POST /mcp must send `Authorization: Bearer <AUTH_TOKEN>`
# or receive a 401. Set it as an encrypted secret (recommended), not plaintext:
#   wrangler secret put AUTH_TOKEN
# For local dev you can put it in a git-ignored `.dev.vars` file:
#   AUTH_TOKEN = "your-token"
# [vars]
# AUTH_TOKEN = ""

# Cloudflare D1 binding. Create the database with:
#   wrangler d1 create devin_scope
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "devin_scope"
database_id = "db225267-1030-4869-9530-b7cfdc4ff586"

# Cloudflare Workers AI binding used by decompose_task for model-backed
# decomposition. Optional: without it the tool uses a deterministic heuristic.
# Override the default model (@cf/meta/llama-3-8b-instruct) via the
# DECOMPOSE_MODEL var below if desired.
[ai]
binding = "AI"

# [vars]
# DECOMPOSE_MODEL = "@cf/meta/llama-3-8b-instruct"

# Optional "Modo B": delegate the adversarial review to a separate critic Devin
# session via the Devin REST API. Configure the API key as a secret (never commit it):
#   wrangler secret put DEVIN_API_KEY
# When unset, run_adversarial_review falls back to "Modo A" (in-agent review).
# Optionally override the API base URL (defaults to https://api.devin.ai/v1):
# [vars]
# DEVIN_API_BASE_URL = "https://api.devin.ai/v1"
